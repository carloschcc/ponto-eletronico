version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    expose:
      - "80"
    extra_hosts:
      # Se o MySQL roda no próprio servidor Linux (fora do Docker), use
      # DB_HOST=host.docker.internal no .env para o container alcançá-lo.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
